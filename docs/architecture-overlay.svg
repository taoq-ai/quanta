<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="red" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#dc2626"/>
    </marker>
    <style>
      .title{font-size:26px;font-weight:700;fill:#0f172a}
      .sub{font-size:14px;fill:#64748b}
      .zone{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}
      .zlbl{font-size:13px;font-weight:700;fill:#64748b;letter-spacing:.06em}
      .tool{fill:#eef2ff;stroke:#6366f1;stroke-width:1.5}
      .toolname{font-size:15px;font-weight:700;fill:#3730a3}
      .storename{font-size:14px;font-weight:700;fill:#0c4a6e}
      .ctrl{fill:#ecfdf5;stroke:#10b981;stroke-width:1.4}
      .ctrltxt{font-size:11.5px;fill:#065f46}
      .ok{font-size:12px;font-weight:700;fill:#059669}
      .edge{stroke:#cbd5e1;stroke-width:1.4;fill:none}
      .actor{fill:#0f172a}
      .actxt{font-size:13px;fill:#0f172a;font-weight:600}
      .redpath{stroke:#dc2626;stroke-width:4;fill:none;stroke-dasharray:2 0}
      .redlbl{font-size:13px;font-weight:700;fill:#b91c1c}
    </style>
  </defs>

  <rect x="0" y="0" width="1100" height="660" fill="#ffffff"/>
  <text x="40" y="46" class="title">…and the composition is still critical</text>
  <text x="40" y="70" class="sub">Every box is hardened. The <tspan fill="#b91c1c" font-weight="700">path</tspan> between them is not — and the agent can walk it.</text>

  <!-- Analyst actor -->
  <circle cx="78" cy="350" r="16" class="actor"/>
  <rect x="58" y="368" width="40" height="22" rx="6" class="actor"/>
  <text x="78" y="410" text-anchor="middle" class="actxt">Analyst</text>
  <line x1="100" y1="360" x2="178" y2="360" class="edge" marker-end="url(#arrow)"/>

  <!-- AgentCore Runtime zone -->
  <rect x="180" y="120" width="430" height="470" rx="14" class="zone"/>
  <text x="200" y="148" class="zlbl">AMAZON BEDROCK AGENTCORE RUNTIME</text>

  <rect x="210" y="300" width="160" height="120" rx="12" fill="#fff" stroke="#6366f1" stroke-width="2"/>
  <text x="290" y="346" text-anchor="middle" class="toolname" font-size="17">Quanta</text>
  <text x="290" y="368" text-anchor="middle" class="sub">analyst agent</text>
  <text x="290" y="392" text-anchor="middle" class="sub">(Strands + Claude)</text>

  <rect x="410" y="172" width="180" height="44" rx="10" class="tool"/>
  <text x="424" y="199" class="toolname">search_database</text>
  <rect x="410" y="280" width="180" height="44" rx="10" class="tool"/>
  <text x="424" y="307" class="toolname">run_analysis</text>
  <rect x="410" y="388" width="180" height="44" rx="10" class="tool"/>
  <text x="424" y="415" class="toolname">fetch_reference</text>
  <rect x="410" y="496" width="180" height="44" rx="10" class="tool"/>
  <text x="424" y="523" class="toolname">send_email_report</text>

  <line x1="370" y1="330" x2="410" y2="194" class="edge" marker-end="url(#arrow)"/>
  <line x1="370" y1="338" x2="410" y2="302" class="edge" marker-end="url(#arrow)"/>
  <line x1="370" y1="378" x2="410" y2="410" class="edge" marker-end="url(#arrow)"/>
  <line x1="370" y1="392" x2="410" y2="518" class="edge" marker-end="url(#arrow)"/>

  <!-- Data / egress plane zone -->
  <rect x="660" y="120" width="400" height="470" rx="14" class="zone"/>
  <text x="680" y="148" class="zlbl">DATA &amp; EGRESS PLANE</text>

  <rect x="690" y="168" width="180" height="52" rx="10" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="704" y="190" class="storename">Read-only replica</text>
  <text x="704" y="208" class="sub">customer-level rows</text>
  <rect x="884" y="172" width="160" height="44" rx="8" class="ctrl"/>
  <text x="894" y="190" class="ok">✓ control held</text>
  <text x="894" y="207" class="ctrltxt">read-only · param. queries</text>

  <rect x="690" y="276" width="180" height="52" rx="10" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="704" y="298" class="storename">Sandbox runtime</text>
  <rect x="884" y="280" width="160" height="44" rx="8" class="ctrl"/>
  <text x="894" y="298" class="ok">✓ control held</text>
  <text x="894" y="315" class="ctrltxt">import-less · time-limited</text>

  <rect x="690" y="384" width="180" height="52" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="704" y="406" class="storename">External reference</text>
  <text x="704" y="424" class="sub">untrusted content</text>
  <rect x="884" y="388" width="160" height="44" rx="8" class="ctrl"/>
  <text x="894" y="406" class="ok">✓ control held</text>
  <text x="894" y="423" class="ctrltxt">egress allowlist (dest.)</text>

  <rect x="690" y="492" width="180" height="52" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="704" y="514" class="storename">Report delivery</text>
  <text x="704" y="532" class="sub">external channel</text>
  <rect x="884" y="496" width="160" height="44" rx="8" class="ctrl"/>
  <text x="894" y="514" class="ok">✓ control held</text>
  <text x="894" y="531" class="ctrltxt">audit log · dry-run</text>

  <line x1="590" y1="194" x2="690" y2="194" class="edge" marker-end="url(#arrow)"/>
  <line x1="590" y1="302" x2="690" y2="302" class="edge" marker-end="url(#arrow)"/>
  <line x1="590" y1="410" x2="690" y2="410" class="edge" marker-end="url(#arrow)"/>
  <line x1="590" y1="518" x2="690" y2="518" class="edge" marker-end="url(#arrow)"/>

  <!-- ===== RED RESIDUAL EXFILTRATION PATH ===== -->
  <!-- 1) untrusted content enters via fetch_reference -->
  <path d="M690,402 C656,396 470,400 300,392 L300,382" class="redpath" stroke-dasharray="7 5" marker-end="url(#red)"/>
  <text x="612" y="468" class="redlbl">① indirect injection</text>
  <text x="612" y="484" class="redlbl" font-weight="600" font-size="11">(untrusted content in)</text>

  <!-- 2) private read -->
  <text x="214" y="250" class="redlbl">② read private data</text>
  <!-- 3) the critical chain: search_database -> send_email_report -->
  <path d="M500,216 C548,250 548,462 504,496" class="redpath" marker-end="url(#red)"/>
  <text x="214" y="462" class="redlbl">③ search_database → send_email_report</text>
  <text x="214" y="480" class="redlbl">= CRITICAL data exfiltration</text>

  <!-- banner -->
  <rect x="180" y="600" width="880" height="40" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="200" y="625" class="redlbl" font-size="15">Lethal trifecta in one agent: private data + untrusted content + external channel. No single control failed — the graph did.</text>
</svg>
