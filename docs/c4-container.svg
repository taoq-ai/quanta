<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 770" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .h{font-size:25px;font-weight:700;fill:#0f172a}
      .sub{font-size:14px;fill:#64748b}
      .pt{font-size:19px;font-weight:700;fill:#ffffff;text-anchor:middle}
      .ty{font-size:11px;fill:#dbeafe;text-anchor:middle}
      .ds{font-size:12px;fill:#e8eef7;text-anchor:middle}
      .rel{font-size:11.5px;fill:#475569}
      .relbg{fill:#ffffff;fill-opacity:0.85}
      .bnd{fill:none;stroke:#94a3b8;stroke-width:2;stroke-dasharray:7 6}
      .bndl{font-size:13px;font-weight:700;fill:#475569}
      .tag{font-size:11px;font-weight:700;text-anchor:middle}
    </style>
  </defs>
  <rect width="1200" height="770" fill="#ffffff"/>
  <text x="40" y="46" class="h">Quanta — solution design (C4 container view)</text>
  <text x="40" y="70" class="sub">Every container ships a real control. The composition risk is not in any box — it is the path across them.</text>

  <!-- Person -->
  <g>
    <rect x="60" y="110" width="230" height="92" rx="10" fill="#08427b"/>
    <text x="175" y="150" class="pt">Data Analyst</text>
    <text x="175" y="170" class="ty">[Person]</text>
    <text x="175" y="189" class="ds">asks analytics questions</text>
  </g>

  <!-- External managed model -->
  <g>
    <rect x="910" y="110" width="230" height="92" rx="10" fill="#708090"/>
    <text x="1025" y="150" class="pt">Amazon Bedrock</text>
    <text x="1025" y="170" class="ty">[External · managed LLM]</text>
    <text x="1025" y="189" class="ds">Claude — tool-use reasoning</text>
  </g>

  <!-- System boundary -->
  <rect class="bnd" x="60" y="250" width="1080" height="270" rx="14"/>
  <text x="78" y="276" class="bndl">Quanta — Amazon Bedrock AgentCore Runtime  [Software System]</text>

  <!-- Agent loop container -->
  <g>
    <rect x="80" y="300" width="250" height="180" rx="10" fill="#1168bd"/>
    <text x="205" y="356" class="pt">Agent loop</text>
    <text x="205" y="377" class="ty">[Container · Strands]</text>
    <text x="205" y="402" class="ds">plans &amp; sequences</text>
    <text x="205" y="420" class="ds">the four tools</text>
  </g>

  <!-- Tool containers -->
  <!-- search_database -->
  <g>
    <rect x="372" y="300" width="180" height="180" rx="10" fill="#1f7ad4"/>
    <text x="462" y="350" class="pt" font-size="16">search_database</text>
    <text x="462" y="370" class="ty">[Container]</text>
    <text x="462" y="395" class="ds">read-only replica</text>
    <text x="462" y="413" class="ds">parameterised (no SQL)</text>
  </g>
  <!-- run_analysis -->
  <g>
    <rect x="566" y="300" width="180" height="180" rx="10" fill="#1f7ad4"/>
    <text x="656" y="350" class="pt" font-size="17">run_analysis</text>
    <text x="656" y="370" class="ty">[Container]</text>
    <text x="656" y="395" class="ds">sandbox · no network</text>
    <text x="656" y="413" class="ds">no imports · timed</text>
  </g>
  <!-- fetch_reference -->
  <g>
    <rect x="760" y="300" width="180" height="180" rx="10" fill="#1f7ad4"/>
    <text x="850" y="350" class="pt" font-size="16">fetch_reference</text>
    <text x="850" y="370" class="ty">[Container]</text>
    <text x="850" y="395" class="ds">egress allowlist</text>
    <text x="850" y="413" class="ds">(destination only)</text>
  </g>
  <!-- send_email_report -->
  <g>
    <rect x="954" y="300" width="180" height="180" rx="10" fill="#1f7ad4"/>
    <text x="1044" y="348" class="pt" font-size="14.5">send_email_report</text>
    <text x="1044" y="368" class="ty">[Container]</text>
    <text x="1044" y="393" class="ds">domain allowlist</text>
    <text x="1044" y="411" class="ds">audit · dry-run</text>
  </g>

  <!-- External data systems / sinks -->
  <g>
    <rect x="372" y="590" width="180" height="92" rx="10" fill="#438dd5"/>
    <text x="462" y="628" class="pt" font-size="15">Analytics replica</text>
    <text x="462" y="648" class="ty">[Data store · read-only]</text>
    <text x="462" y="667" class="ds">UCI Online Retail II</text>
  </g>
  <g>
    <rect x="760" y="590" width="180" height="92" rx="10" fill="#708090"/>
    <text x="850" y="628" class="pt" font-size="15">Reference sources</text>
    <text x="850" y="648" class="ty">[External · allowlisted]</text>
    <text x="850" y="667" class="ds">content is untrusted</text>
  </g>
  <g>
    <rect x="954" y="590" width="180" height="92" rx="10" fill="#708090"/>
    <text x="1044" y="628" class="pt" font-size="16">Mail relay</text>
    <text x="1044" y="648" class="ty">[External · dry-run]</text>
    <text x="1044" y="667" class="ds">allowlisted domain</text>
  </g>

  <!-- Relationships -->
  <!-- analyst -> agent loop -->
  <path d="M175 202 L195 300" class="bnd" stroke="#64748b" stroke-dasharray="0" marker-end="url(#arr)"/>
  <rect class="relbg" x="120" y="244" width="150" height="18"/>
  <text x="128" y="257" class="rel">prompt (HTTPS)</text>
  <!-- agent loop -> bedrock -->
  <path d="M330 330 L910 175" class="bnd" stroke="#64748b" stroke-dasharray="0" marker-end="url(#arr)"/>
  <rect class="relbg" x="560" y="232" width="160" height="18"/>
  <text x="568" y="245" class="rel">tool-use reasoning</text>
  <!-- agent loop -> tools (short) -->
  <path d="M330 372 L372 372" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M330 388 L566 470" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M330 398 L760 472" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M330 408 L954 474" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="338" y="365" class="rel" fill="#94a3b8">calls tools in sequence</text>
  <!-- search_database -> replica -->
  <path d="M462 480 L462 590" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <!-- fetch_reference -> reference -->
  <path d="M850 480 L850 590" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <!-- send_email_report -> mail -->
  <path d="M1044 480 L1044 590" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- trust tags on the three boundary crossings -->
  <g>
    <rect x="408" y="520" width="108" height="22" rx="11" fill="#dbeafe"/>
    <text x="462" y="535" class="tag" fill="#1d4ed8">PRIVATE data</text>
  </g>
  <g>
    <rect x="788" y="520" width="124" height="22" rx="11" fill="#fef3c7"/>
    <text x="850" y="535" class="tag" fill="#b45309">UNTRUSTED in</text>
  </g>
  <g>
    <rect x="980" y="520" width="128" height="22" rx="11" fill="#dcfce7"/>
    <text x="1044" y="535" class="tag" fill="#047857">EXTERNAL out</text>
  </g>

  <text x="600" y="740" text-anchor="middle" class="sub">Three of these containers form the lethal trifecta — private read · untrusted ingest · external send — reachable in one agent run.</text>
</svg>
