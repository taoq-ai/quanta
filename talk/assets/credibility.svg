<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .h{font-size:26px;font-weight:700;fill:#0f172a}
      .sub{font-size:15px;fill:#64748b}
      .card{fill:#f8fafc;stroke:#e2e8f0;stroke-width:1.5;rx:14}
      .big{font-size:54px;font-weight:800;fill:#4338ca;text-anchor:middle}
      .biglbl{font-size:15px;font-weight:600;fill:#475569;text-anchor:middle}
      .small{font-size:13px;fill:#64748b;text-anchor:middle}
      .pill{fill:#eef2ff;stroke:#6366f1;stroke-width:1.4;rx:18}
      .pillt{font-size:14px;font-weight:700;fill:#3730a3;text-anchor:middle}
    </style>
  </defs>
  <rect width="1100" height="560" fill="#ffffff"/>
  <text x="40" y="50" class="h">ZIRAN — what's behind the scan</text>
  <text x="40" y="78" class="sub">Open-source agent security testing · github.com/taoq-ai/ziran</text>

  <g>
    <rect x="40" y="110" width="240" height="150" class="card"/>
    <text x="160" y="190" class="big">639</text><text x="160" y="222" class="biglbl">attack vectors</text><text x="160" y="244" class="small">11 categories</text>

    <rect x="300" y="110" width="240" height="150" class="card"/>
    <text x="420" y="190" class="big">100%</text><text x="420" y="222" class="biglbl">OWASP LLM Top-10</text><text x="420" y="244" class="small">10 / 10 covered</text>

    <rect x="560" y="110" width="240" height="150" class="card"/>
    <text x="680" y="190" class="big">367</text><text x="680" y="222" class="biglbl">critical-severity</text><text x="680" y="244" class="small">229 multi-turn</text>

    <rect x="820" y="110" width="240" height="150" class="card"/>
    <text x="940" y="190" class="big">3</text><text x="940" y="222" class="biglbl">chain topologies</text><text x="940" y="244" class="small">direct · indirect · cycle</text>
  </g>

  <text x="40" y="330" class="h" font-size="20">The differentiator: it reasons about tool <tspan fill="#4338ca">composition</tspan></text>
  <text x="40" y="360" class="sub">Most tools test prompts one at a time. ZIRAN builds the agent's capability graph and finds the dangerous combinations.</text>

  <g>
    <rect x="40" y="392" width="320" height="44" class="pill"/><text x="200" y="420" class="pillt">read private  →  send external  =  exfiltration</text>
    <rect x="384" y="392" width="320" height="44" class="pill"/><text x="544" y="420" class="pillt">fetch untrusted  →  execute  =  RCE surface</text>
    <rect x="728" y="392" width="332" height="44" class="pill"/><text x="894" y="420" class="pillt">built-in patterns — not hand-labelled</text>
  </g>

  <rect x="40" y="464" width="1020" height="56" rx="12" fill="#eef2ff"/>
  <text x="60" y="498" font-size="17" font-weight="700" fill="#3730a3">“The vulnerability lives in the graph, not in any node.”</text>
</svg>
